name: Create release on merged PR

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: release-on-merge
  cancel-in-progress: false

jobs:
  release:
    name: Create tag & release (on merged PR)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (fetch tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Determine bump and create tag
        id: bump
        run: |
          set -euo pipefail
          title="${{ github.event.pull_request.title }}"
          echo "PR title: $title"

          # Do not create another version when this workflow is rerun for a
          # merge commit that already has a release tag.
          existing_tag=$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' | head -n1 || true)
          if [ -n "$existing_tag" ]; then
            echo "HEAD is already tagged as $existing_tag. Exiting without creating a new release."
            exit 0
          fi

          # Decide bump type from a Conventional Commit-style PR title:
          #   feat!: / feat(scope)!: / fix!: -> major
          #   feat: / feat(scope):          -> minor
          #   fix: / fix(scope):            -> patch
          bump_type="none"
          if echo "$title" | grep -Eiq '^(feat|fix)(\([^)]+\))?!:'; then
            bump_type=major
          elif echo "$title" | grep -Eiq '^feat(\([^)]+\))?:'; then
            bump_type=minor
          elif echo "$title" | grep -Eiq '^fix(\([^)]+\))?:'; then
            bump_type=patch
          else
            echo "No recognized release prefix (feat!, feat:, fix!, fix:). Exiting without creating a release." >&2
            exit 0
          fi

          echo "Bump type: $bump_type"

          # Fetch tags and determine latest semver tag (vMAJOR.MINOR.PATCH)
          git fetch --tags --prune
          latest_tag=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          echo "Latest tag: $latest_tag"

          if [ -z "$latest_tag" ]; then
            major=0
            minor=0
            patch=0
          else
            ver=${latest_tag#v}
            IFS='.' read -r major minor patch <<< "$ver"
            major=${major:-0}
            minor=${minor:-0}
            patch=${patch:-0}
          fi

          case $bump_type in
            major)
              major=$((major+1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor+1))
              patch=0
              ;;
            patch)
              patch=$((patch+1))
              ;;
          esac

          new_tag="v${major}.${minor}.${patch}"
          echo "New tag: $new_tag"

          # Create annotated tag and push it
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git tag -a "$new_tag" -m "Release $new_tag"
          git push origin "$new_tag"

          # Expose the new tag for later steps
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release for new tag
        if: steps.bump.outputs.new_tag != ''
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.bump.outputs.new_tag }}
          name: ${{ steps.bump.outputs.new_tag }}
          body: |
            Automated release created from merged PR #${{ github.event.pull_request.number }}
            PR title: ${{ github.event.pull_request.title }}
