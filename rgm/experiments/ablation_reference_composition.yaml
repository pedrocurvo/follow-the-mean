name: ablation_reference_composition
script: training_free_control.py
sections:
- controllability
common:
  out_dir: runs/ablation_reference_composition
retrieval:
  reuse_reference: true
  reference_size: 20
  guidance_strength: 0.2
  beta_schedule: bell
  guidance_start_frac: 0.15
  guidance_end_frac: 0.95
  topk: 4
  callback_verbose: false
controllability:
  fractions:
  - 0.0
  - 0.25
  - 0.5
  - 0.75
  - 1.0
  specs:
  - slug: elephant_color
    title: 'Controllability via reference composition: elephant color'
    prompt: an elephant in a jungle
    source_prompt: an elephant
    target_prompt: a pink elephant
  - slug: cat_style
    title: 'Controllability via reference composition: cat style'
    prompt: a cat
    source_prompt: a van gogh painting
    target_prompt: a black and white sketch
  - slug: savanna_object
    title: 'Controllability via reference composition: savanna object'
    prompt: an animal in a savanna
    source_prompt: a zebra
    target_prompt: a giraffe
